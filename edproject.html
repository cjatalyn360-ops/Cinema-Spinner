<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cinema Spinner</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">
        <span class="cinema">The Cinema</span>
        <span class="spinner">SPINNER</span>
      </div>
    </div>

    <div id="filters">
      <label>Genre:</label>
      <select id="genreSelect">
        <option value="">Any</option>
        <option value="28">Action</option>
        <option value="35">Comedy</option>
        <option value="18">Drama</option>
        <option value="27">Horror</option>
        <option value="10751">Family</option>
      </select>

      <label>Year Range:</label>
      <select id="yearRange">
        <option value="">Any</option>
        <option value="1980-1990">1980–1990</option>
        <option value="1990-2000">1990–2000</option>
        <option value="2000-2010">2000–2010</option>
        <option value="2010-2020">2010–2020</option>
        <option value="2020-2024">2020–2024</option>
      </select>

      <label>Actor Name:</label>
      <input type="text" id="actorInput" placeholder="Optional" />

      <button id="randomizeBtn">🎬 Randomize Movie</button>
    </div>

    <div id="movieDisplay" class="hidden">
      <div id="moviePlaceholder">
        <h2>🎬 Ready to spin?</h2>
        <p>
          Choose your filters above and click
          <strong>Randomize Movie</strong>
          to get a recommendation.
        </p>
      </div>
      <img id="poster" src="" />

      <div class="movie-info">
        <h2 id="movieTitle"></h2>
        <p id="movieDesc"></p>

        <div class="movie-meta">
          <p id="movieRating"></p>
          <p id="movieYear"></p>
        </div>

        <div class="spin-container hidden">
          <button id="spinAgain">Spin Again</button>
          <p class="spin-hint">Press <strong>Enter</strong> to spin again</p>
        </div>
      </div>
    </div>

    <div class="history-section">
      <h2>History</h2>
      <button id="clearHistoryBtn">Clear History</button>
      <div id="historyList"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
